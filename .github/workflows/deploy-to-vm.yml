name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_HOST: "sovereinia.org"
  DEPLOY_USER: "deploy"
  # Serving directory on the VM. nginx serves this at https://sovereinia.org/guia/
  # (Vite is configured with base '/guia/'). Must match nginx root + /guia subdir.
  DEPLOY_PATH: "/srv/apps/sovereinia/guia/"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/deploy_key ]; then
            echo "Private key is missing or empty"; exit 1
          fi

      - name: Deploy build to VM
        run: |
          # Push the freshly built static site to the serving directory.
          # --delete keeps the remote a clean mirror of dist/ (no stale assets).
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - name: Smoke test
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://sovereinia.org/guia/)
          echo "GET /guia/ -> $code"
          test "$code" = "200"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
